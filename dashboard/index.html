<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Projectr Analytics — Real estate geospatial dashboard for market analysis">
    <title>Projectr Analytics — Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header id="app-header">
        <div class="header-brand">
            <h1>Projectr Analytics</h1>
            <span class="header-subtitle">Real Estate Intelligence</span>
        </div>
        <div class="header-controls">
            <select id="market-selector">
                <option value="austin">Austin–Round Rock, TX</option>
            </select>
            <button id="theme-toggle" aria-label="Toggle theme">🌙</button>
        </div>
    </header>

    <main id="app-main">
        <aside id="sidebar">
            <div class="panel" id="layer-panel">
                <h2>Map Layers</h2>
                <label><input type="checkbox" id="toggle-heatmap" checked> Rent Heatmap</label>
                <label><input type="checkbox" id="toggle-permits"> Permits</label>
                <label><input type="checkbox" id="toggle-vacancy"> Vacancy Rates</label>
                <label><input type="checkbox" id="toggle-jobs"> Job Growth</label>
                <label><input type="checkbox" id="toggle-boundaries" checked> Boundaries</label>
            </div>
            <div class="panel" id="metrics-panel">
                <h2>Market Metrics</h2>
                <div id="metrics-content">
                    <p class="loading">Loading metrics...</p>
                </div>
            </div>
        </aside>

        <div id="map-container">
            <div id="map"></div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/map.js"></script>
    <script src="js/controls.js"></script>
    <script src="js/app.js"></script>
    <script async defer
        src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&libraries=visualization&callback=initApp">
    </script>
</body>
</html>
