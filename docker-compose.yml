version: "3.9"

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: projectr-db
    environment:
      POSTGRES_USER: projectr
      POSTGRES_PASSWORD: projectr
      POSTGRES_DB: projectr_analytics
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    container_name: projectr-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./dashboard:/app/dashboard

volumes:
  pgdata:
