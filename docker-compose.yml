version: "3.9"

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: projectr-db
    environment:
      POSTGRES_USER: projectr
      POSTGRES_PASSWORD: projectr
      POSTGRES_DB: projectr_analytics
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    container_name: projectr-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - ./dashboard/dist:/app/dashboard/dist

  redis:
    image: redis:7-alpine
    container_name: projectr-redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  pgdata:
